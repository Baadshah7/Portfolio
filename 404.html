<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Saad Shah</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/Portfolio/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#0F172A">
</head>
<body class="bg-slate900 text-textLight font-sans antialiased selection:bg-bluePrimary selection:text-white flex items-center justify-center min-h-screen">

    <div class="text-center px-4">
        <div class="inline-block relative">
            <i class="fa-solid fa-shield-halved text-9xl text-slate800"></i>
            <i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold text-textLight mt-8 tracking-tight font-mono">
            404
        </h1>
        <p class="text-bluePrimary font-mono font-bold tracking-widest mt-2 uppercase text-sm">
            STATUS // NOT_FOUND
        </p>
        <p class="text-textMuted mt-4 max-w-md mx-auto text-lg">
            The requested sector has been classified or does not exist on this server.
        </p>
        <div class="mt-10">
            <a href="/Portfolio/" class="px-8 py-3.5 bg-bluePrimary hover:bg-blue-600 text-white font-medium rounded-lg shadow-lg shadow-bluePrimary/20 transition-all transform hover:-translate-y-0.5 inline-flex items-center gap-2">
                <i class="fa-solid fa-house"></i> Return to Base
            </a>
        </div>
    </div>

</body>
</html>
